<p style="text-align:center; color:#9ca3af; max-width:600px; margin:auto;">
  Let’s connect — feel free to reach out for opportunities or collaborations.

<div class="grid" style="margin-top:40px;">

  <!-- EMAIL CARD -->
  <div class="card reveal glow-card" style="text-align:center;">
    <h2>Email</h2>
    <p id="emailText" style="color:#f5f5f5;">oliviaburkman@gmail.com</p>

  <!-- LINKEDIN -->

<!-- ICON ROW -->

<script>
/* scroll animation */
const items = document.querySelectorAll('.reveal');

const observer = new IntersectionObserver(entries => {
  entries.forEach((entry, i) => {
    if (entry.isIntersecting) {
      setTimeout(() => {
        entry.target.classList.add('show');
      }, i * 80);
    }
  });
}, { threshold: 0.15 });

items.forEach(i => observer.observe(i));

/* COPY EMAIL FUNCTION */
function copyEmail() {
  const email = "oliviaburkman@gmail.com";
  navigator.clipboard.writeText(email);

  alert("Email copied to clipboard!");
}
</script>
