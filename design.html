<!DOCTYPE html>
<html>
<head>
  <title>Design</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<nav>
  <a href="index.html">Home</a>
  <a href="projects.html">Projects</a>
  <a href="design.html">Design</a>
  <a href="resume.html">Resume</a>

<section>
  <h2>Design Portfolio</h2>

  <!-- FILTER BUTTONS -->
  <div class="filters">
    <button class="active" onclick="filterSelection('all', this)">All</button>
    <button onclick="filterSelection('flyer', this)">Flyers</button>
    <button onclick="filterSelection('social', this)">Social</button>
    <button onclick="filterSelection('branding', this)">Branding</button>
  </div>

  <!-- GALLERY -->
  <div class="grid">

    <!-- FLYERS -->
    <div class="item flyer" onclick="openLightbox('images/flyer1.jpg')">
      <img src="images/flyer1.jpg">
      <div class="overlay"><span>Flyer</span></div>
    </div>

    <div class="item flyer" onclick="openLightbox('images/flyer2.jpg')">
      <img src="images/flyer2.jpg">
      <div class="overlay"><span>Menu</span></div>
    </div>

    <div class="item flyer" onclick="openLightbox('images/flyer3.jpg')">
      <img src="images/flyer3.jpg">
      <div class="overlay"><span>Menu</span></div>
    </div>

    <div class="item flyer" onclick="openLightbox('images/flyer4.jpg')">
      <img src="images/flyer4.jpg">
      <div class="overlay"><span>Menu</span></div>
    </div>

    <div class="item flyer" onclick="openLightbox('images/flyer5.jpg')">
      <img src="images/flyer5.jpg">
      <div class="overlay"><span>Menu</span></div>
    </div>

    <div class="item flyer" onclick="openLightbox('images/flyer6.jpg')">
      <img src="images/flyer6.jpg">
      <div class="overlay"><span>Menu</span></div>
    </div>

    <!-- SOCIAL -->
    <div class="item social" onclick="openLightbox('images/social1.jpg')">
      <img src="images/social1.jpg">
      <div class="overlay"><span>Social</span></div>
    </div>

    <!-- BRANDING -->
    <div class="item branding" onclick="openLightbox('images/brand1.jpg')">
      <img src="images/brand1.jpg">
      <div class="overlay"><span>Branding</span></div>
    </div>

  </div>
</section>

<!-- LIGHTBOX (POPUP) -->
<div class="lightbox" id="lightbox" onclick="closeLightbox(event)">
  <img id="lightbox-img">
</div>

<script>
  // OPEN POPUP
  function openLightbox(src) {
    document.getElementById("lightbox-img").src = src;
    document.getElementById("lightbox").classList.add("active");
  }

  // CLOSE POPUP (only when clicking background)
  function closeLightbox(e) {
    if (!e || e.target.id === "lightbox") {
      document.getElementById("lightbox").classList.remove("active");
    }
  }

  // ESC KEY CLOSE
  document.addEventListener("keydown", function(e) {
    if (e.key === "Escape") closeLightbox();
  });

  // FILTER SYSTEM
  function filterSelection(category, btn) {
    let items = document.querySelectorAll(".item");

    items.forEach(item => {
      item.style.display = "block";

      if (category !== "all" && !item.classList.contains(category)) {
        item.style.display = "none";
      }
    });

    document.querySelectorAll(".filters button")
      .forEach(b => b.classList.remove("active"));

    btn.classList.add("active");
  }
</script>

</body>
</html>
