<!DOCTYPE html>
<html>
<head>
  <title>Design</title>
  <link rel="stylesheet" href="style.css">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0d0d0d;
      color: white;
    }

    nav {
      display: flex;
      justify-content: center;
      gap: 30px;
      padding: 20px;
      background: #111;
    }

    nav a {
      color: white;
      text-decoration: none;
      font-size: 14px;
    }

    nav a:hover {
      color: #ffb6c1;
    }

    section {
      padding: 50px 20px;
      max-width: 1100px;
      margin: auto;
    }

    h2 {
      text-align: center;
      margin-bottom: 30px;
    }

    /* GRID */
    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 20px;
    }

    /* ITEM */
    .item {
      position: relative;
      border-radius: 16px;
      overflow: hidden;
      cursor: pointer;
    }

    .item img {
      width: 100%;
      height: 220px;
      object-fit: cover;
      transition: 0.3s ease;
    }

    /* HOVER OVERLAY */
    .overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.6);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: 0.3s;
    }

    .overlay span {
      background: linear-gradient(135deg, #ffb6c1, #ffc0cb);
      color: black;
      padding: 8px 14px;
      border-radius: 10px;
      font-size: 14px;
    }

    .item:hover img {
      transform: scale(1.05);
    }

    .item:hover .overlay {
      opacity: 1;
    }

    /* POPUP (LIGHTBOX) */
    .lightbox {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: rgba(0,0,0,0.85);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    .lightbox img {
      max-width: 90%;
      max-height: 85%;
      border-radius: 12px;
    }

    .lightbox.active {
      display: flex;
    }

    /* CLOSE BUTTON */
    .close {
      position: absolute;
      top: 30px;
      right: 40px;
      font-size: 28px;
      color: white;
      cursor: pointer;
    }

  </style>
</head>

<body>

<nav>
  <a href="index.html">Home</a>
  <a href="projects.html">Projects</a>
  <a href="design.html">Design</a>
  <a href="resume.html">Resume</a>
  <a href="contact.html">Contact</a>
</nav>

<section>
  <h2>Design Portfolio</h2>

  <div class="gallery">

    <!-- ITEM 1 -->
    <div class="item" onclick="openLightbox('images/design1.jpg')">
      <img src="images/design1.jpg">
      <div class="overlay"><span>View</span></div>
    </div>

    <!-- ITEM 2 -->
    <div class="item" onclick="openLightbox('images/design2.jpg')">
      <img src="images/design2.jpg">
      <div class="overlay"><span>View</span></div>
    </div>

    <!-- ITEM 3 -->
    <div class="item" onclick="openLightbox('images/design3.jpg')">
      <img src="images/design3.jpg">
      <div class="overlay"><span>View</span></div>
    </div>

  </div>
</section>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox">
  <span class="close" onclick="closeLightbox()">&times;</span>
  <img id="lightbox-img">
</div>

<script>
  function openLightbox(src) {
    document.getElementById("lightbox-img").src = src;
    document.getElementById("lightbox").classList.add("active");
  }

  function closeLightbox() {
    document.getElementById("lightbox").classList.remove("active");
  }
</script>

</body>
</html>
