<!DOCTYPE html>
<html>
<head>
  <title>Design</title>

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0d0d0d;
      color: white;
    }

    nav {
      display: flex;
      justify-content: center;
      gap: 30px;
      padding: 20px;
      background: #111;
    }

    nav a {
      color: white;
      text-decoration: none;
      font-size: 14px;
      transition: 0.2s;
    }

    nav a:hover {
      color: #ffb6c1;
    }

    section {
      padding: 60px 20px;
      max-width: 1100px;
      margin: auto;
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
      font-weight: 500;
    }

    /* FILTER BUTTONS */
    .filters {
      text-align: center;
      margin-bottom: 30px;
    }

    .filters button {
      background: none;
      border: 1px solid #333;
      color: #aaa;
      padding: 6px 12px;
      margin: 5px;
      border-radius: 8px;
      cursor: pointer;
      transition: 0.2s;
    }

    .filters button.active,
    .filters button:hover {
      border-color: #ffb6c1;
      color: #ffb6c1;
    }

    /* GRID */
    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 20px;
    }

    /* ITEM */
    .item {
      position: relative;
      border-radius: 16px;
      overflow: hidden;
      cursor: pointer;
      transition: 0.3s;
    }

    .item.hide {
      opacity: 0;
      transform: scale(0.95);
      pointer-events: none;
      position: absolute;
    }

    .item img {
      width: 100%;
      height: 220px;
      object-fit: cover;
      transition: 0.3s ease;
    }

    /* OVERLAY */
    .overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.6);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: 0.3s;
    }

    .overlay span {
      background: linear-gradient(135deg, #ffb6c1, #ffc0cb);
      color: black;
      padding: 8px 14px;
      border-radius: 10px;
      font-size: 14px;
    }

    .item:hover img {
      transform: scale(1.05);
    }

    .item:hover .overlay {
      opacity: 1;
    }

    /* LIGHTBOX */
    .lightbox {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.9);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      animation: fadeIn 0.3s ease;
    }

    .lightbox img {
      max-width: 90%;
      max-height: 85%;
      border-radius: 12px;
    }

    .lightbox.active {
      display: flex;
    }

    @keyframes fadeIn {
      from {opacity: 0;}
      to {opacity: 1;}
    }

    /* CLOSE */
    .close {
      position: absolute;
      top: 25px;
      right: 35px;
      font-size: 26px;
      cursor: pointer;
    }

  </style>
</head>

<body>

<nav>
  <a href="index.html">Home</a>
  <a href="projects.html">Projects</a>
  <a href="design.html">Design</a>
  <a href="resume.html">Resume</a>
  <a href="contact.html">Contact</a>
</nav>

<section>
  <h2>Design Portfolio</h2>

  <!-- FILTERS -->
  <div class="filters">
    <button class="active" onclick="filterSelection('all', this)">All</button>
    <button onclick="filterSelection('social', this)">Social</button>
    <button onclick="filterSelection('branding', this)">Branding</button>
    <button onclick="filterSelection('flyer', this)">Flyers</button>
  </div>

  <div class="gallery">

    <div class="item social" onclick="openLightbox('images/design1.jpg')">
      <img src="images/design1.jpg">
      <div class="overlay"><span>View</span></div>
    </div>

    <div class="item branding" onclick="openLightbox('images/design2.jpg')">
      <img src="images/design2.jpg">
      <div class="overlay"><span>View</span></div>
    </div>

    <div class="item flyer" onclick="openLightbox('images/flyer1.jpg')">
      <img src="images/flyer1.jpg">
      <div class="overlay"><span>View</span></div>
    </div>

    <div class="item flyer" onclick="openLightbox('images/flyer2.jpg')">
      <img src="images/flyer2.jpg">
      <div class="overlay"><span>View</span></div>
    </div>

    <div class="item flyer" onclick="openLightbox('images/flyer3.jpg')">
      <img src="images/flyer3.jpg">
      <div class="overlay"><span>View</span></div>
    </div>

  </div>
</section>

<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <span class="close">&times;</span>
  <img id="lightbox-img">
</div>

<script>
  function openLightbox(src) {
    document.getElementById("lightbox-img").src = src;
    document.getElementById("lightbox").classList.add("active");
  }

  function closeLightbox() {
    document.getElementById("lightbox").classList.remove("active");
  }

  document.addEventListener("keydown", function(e) {
    if (e.key === "Escape") closeLightbox();
  });

  function filterSelection(category, btn) {
    let items = document.querySelectorAll(".item");

    items.forEach(item => {
      item.classList.remove("hide");
      if (category !== "all" && !item.classList.contains(category)) {
        item.classList.add("hide");
      }
    });

    document.querySelectorAll(".filters button").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
  }
</script>

</body>
</html>
