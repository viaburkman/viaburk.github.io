<body>

<nav>

<section>

<h1>Design Portfolio</h1>

<div class="grid">

  <div class="item" onclick="openLightbox('images/flyer1.jpg')">
    <img src="images/flyer1.jpg">
    <div class="overlay"><span>Flyer</span></div>
  </div>

  <div class="item" onclick="openLightbox('images/flyer2.jpg')">
    <img src="images/flyer2.jpg">
    <div class="overlay"><span>Flyer</span></div>
  </div>

  <div class="item" onclick="openLightbox('images/social1.jpg')">
    <img src="images/social1.jpg">
    <div class="overlay"><span>Social</span></div>
  </div>

</div>

</section>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox" onclick="closeLightbox(event)">
  <img id="lightbox-img">
</div>

<script>
function openLightbox(src){
  document.getElementById('lightbox-img').src = src;
  document.getElementById('lightbox').classList.add('active');
}

function closeLightbox(e){
  if(e.target.id === "lightbox"){
    document.getElementById('lightbox').classList.remove('active');
  }
}

/* ✅ DESIGN ONLY ANIMATION (ISOLATED) */
const items = document.querySelectorAll('.item');

const observer = new IntersectionObserver((entries) => {
  entries.forEach((entry, i) => {
    if(entry.isIntersecting){
      setTimeout(() => {
        entry.target.classList.add('show');
      }, i * 60);
    }
  });
}, { threshold: 0.15 });

items.forEach(item => observer.observe(item));
</script>

</body>
</html>
